version: '3.8'

# ============================================
# Backend Only (Frontend는 Vercel에서 호스팅)
# ============================================

services:
  # ========================================
  # Infrastructure
  # ========================================
  postgres:
    image: postgres:16-alpine
    container_name: teacher-shelter-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: teacher-shelter-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true

  # ========================================
  # Nginx Reverse Proxy (SSL for API)
  # ========================================
  nginx:
    image: nginx:1.27-alpine
    container_name: teacher-shelter-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:-api.teacherlounge.co.kr}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - uploads_data:/app/uploads:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - external
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    command: /bin/sh -c "envsubst '$${DOMAIN}' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

  # Let's Encrypt 인증서 자동 갱신
  certbot:
    image: certbot/certbot
    container_name: teacher-shelter-certbot
    restart: unless-stopped
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - external

  # ========================================
  # Backend API (NestJS)
  # ========================================
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-teacher-shelter}/backend:latest
    container_name: teacher-shelter-api
    restart: always
    expose:
      - '3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      IP_HASH_SALT: ${IP_HASH_SALT}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://teacherlounge.co.kr}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.teacherlounge.co.kr}
      ALLOWED_REDIRECT_ORIGINS: ${ALLOWED_REDIRECT_ORIGINS:-https://teacherlounge.co.kr,https://www.teacherlounge.co.kr}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '2.0'
    security_opt:
      - no-new-privileges:true

networks:
  external:
    driver: bridge
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_data:
  certbot_www:
